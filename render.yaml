services:
  - type: web
    name: fieldvision-backend
    env: python
    runtime: python-3.11.9
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: GEMINI_MODEL
        value: gemini-1.5-flash-latest
      - key: ALLOWED_ORIGINS
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CRICKET_DATA_PROVIDER
        value: auto
      - key: CRICKET_SERIES_FILTER
        value: ipl,indian premier league,t20
      - key: CRICAPI_KEY
        sync: false
